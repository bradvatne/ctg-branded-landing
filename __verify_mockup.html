<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/demo.css">
<style>body{margin:0;background:#eef;display:grid;place-items:center;min-height:100vh}.phones{display:block}.ckdm{width:360px}</style>
</head><body>
<div class="phones">
  <div class="ckdm" role="img" aria-label="map">
    <div class="ckdm-map"></div>

      <span class="lg"></span>

      <span class="rd"><b>1</b></span>
    </div>
    <div class="ckdm-zrow">
      <span class="ckdm-zc"><small class="fast">Selling Fast</small><strong>Pool Club</strong></span>
      <span class="ckdm-zc"><small class="sold">Sold Out</small><strong>Beachfront</strong></span>
      <span class="ckdm-zc"><small class="sold">Sold Out</small><strong>Sunset Deck</strong></span>
    </div>
    <span class="ckdm-pin teal" style="left:38%;top:34%"><i></i><em>Pool Club</em></span>
    <span class="ckdm-pin purple" style="left:66%;top:56%"><i></i><em>Pool Bar</em></span>
    <span class="ckdm-spot free" style="left:24%;top:47%;width:11%;height:8%"></span>
    <span class="ckdm-spot picked" style="left:42%;top:47%;width:11%;height:8%"></span>
    <span class="ckdm-spot sold" style="left:58.5%;top:47%;width:11%;height:8%"></span>
    <span class="ckdm-spot free" style="left:25%;top:57%;width:15%;height:12%"></span>
    <span class="ckdm-spot sold" style="left:49%;top:57%;width:15%;height:12%"></span>
    <span class="ckdm-spot sold" style="left:2%;top:82%;width:12%;height:7.5%"></span>
    <span class="ckdm-spot sold" style="left:18%;top:82%;width:12%;height:7.5%"></span>
    <span class="ckdm-spot sold" style="left:37%;top:82%;width:12%;height:7.5%"></span>
    <span class="ckdm-spot sold" style="left:51%;top:82%;width:12%;height:7.5%"></span>
    <span class="ckdm-spot sold" style="left:72%;top:82%;width:12%;height:7.5%"></span>
    <span class="ckdm-spot sold" style="left:86%;top:82%;width:12%;height:7.5%"></span>
    <span class="ckdm-timer">⏱ 7:36</span>
    <span class="ckdm-zoom"><span>+</span><span>−</span></span>
    <div class="ckdm-tabbar"><span>General Admission</span><span>Promotions</span><span>Free entry party zones</span></div>
  </div>
</div>
</body></html>
